<!DOCTYPE html>
<html>
<head>

  <div class="main-content">
    <section id="contact" class="hero">
        <h2>📬 ติดต่อฉัน (Contact Me)</h2>
        <p class="contact-subtitle">หากคุณมีข้อสงสัยหรือต้องการพูดคุยร่วมงาน สามารถส่งข้อความหรือทักทายมาตามช่องทางด้านล่างนี้ได้เลยนะคะ!</p>
        
        <form class="contact-form" onsubmit="event.preventDefault(); alert('ระบบส่งข้อความจำลองทำงานเรียบร้อยแล้วค่ะ!');">
            <div class="form-group">
                <label for="name">ชื่อของคุณ</label>
                <input type="text" id="name" placeholder="กรอกชื่อของคุณที่นี่..." required>
            </div>
            <div class="form-group">
                <label for="email">อีเมลของคุณ</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">ข้อความที่ต้องการส่ง</label>
                <textarea id="message" rows="4" placeholder="พิมพ์ข้อความของคุณตรงนี้ได้เลยค่ะ..." required></textarea>
            </div>
            <button type="submit" class="btn-submit">ส่งข้อความ ✨</button>
        </form>

        <div class="social-title">หรือช่องทางโซเชียลมีเดียอื่นๆ:</div>
        <div class="social-links">
            <a href="#" class="social-item fb" target="_blank">📱 Facebook</a>
            <a href="#" class="social-item ig" target="_blank">📸 Instagram</a>
            <a href="#" class="social-item line" target="_blank">💬 Line ID</a>
            <a href="mailto:your-email@gmail.com" class="social-item mail">✉️ Gmail</a>
        </div>
    </section>
</div>
